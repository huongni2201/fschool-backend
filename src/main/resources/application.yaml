spring:
  application:
    name: fschool-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:docker}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

app:
  auth:
    dev-otp-code: ${DEV_OTP_CODE:}
    otp-length: ${OTP_LENGTH:6}
    otp-ttl-seconds: ${OTP_TTL_SECONDS:300}
    otp-resend-cooldown-seconds: ${OTP_RESEND_COOLDOWN_SECONDS:60}
  mail:
    from: ${MAIL_FROM:}
  security:
    jwt:
      issuer: ${JWT_ISSUER:fschool-backend}
      access-token-ttl: ${ACCESS_TOKEN_TTL:1h}
      refresh-token-ttl: ${REFRESH_TOKEN_TTL:30d}
